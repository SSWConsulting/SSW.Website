name: PR - build and deploy to slot

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.number }}-${{ github.workflow }}
  cancel-in-progress: true

defaults:
  run:
    shell: pwsh

jobs:
  check-slot-capacity:
    name: Check staging slot capacity
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Load .env file
        uses: xom9ikk/dotenv@v2
        with:
          path: ./.github

      - name: Azure CLI - Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Enforce slot cap
        id: cap
        env:
          PR_SLOT: pr-${{ github.event.number }}
        run: |
          # Default to 10; only override if MAX_PR_SLOTS is a valid positive int
          $max = 10
          $parsed = 0
          if ([int]::TryParse("${{ env.MAX_PR_SLOTS }}", [ref]$parsed) -and $parsed -gt 0) { $max = $parsed }

          # Count only PR slots (the permanent 'staging' slot and 'production' are not PR slots)
          $slots = az webapp deployment slot list `
            --name ${{ env.APP_SERVICE_NAME }} `
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} `
            --query "[?starts_with(name, 'pr-')].name" `
            --output tsv

          $slotArray = @($slots -split "`n" | Where-Object { $_ -ne '' })
          $count = $slotArray.Count

          Write-Host "Open PR slots: $count / $max"

          # An existing PR re-running is an update to its own slot, not a new one - always allow
          if ($slotArray -contains "$env:PR_SLOT") {
            Write-Host "✅ This PR already owns slot $env:PR_SLOT - allowing (update, not a new slot)."
            exit 0
          }

          if ($count -ge $max) {
            $msg = "🛑 **Staging slot limit reached ($count/$max).** This PR can't get a staging deployment until one frees up. Please close or merge another open PR to release its slot, then re-run this workflow."
            "blocked=true"   >> $env:GITHUB_OUTPUT
            "message=$msg"   >> $env:GITHUB_OUTPUT
            Write-Host $msg
            exit 1
          }

          Write-Host "✅ Capacity available ($count/$max) - proceeding."

      - name: Comment on PR when blocked
        if: failure() && steps.cap.outputs.blocked == 'true'
        uses: mshick/add-pr-comment@v3
        with:
          message: ${{ steps.cap.outputs.message }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          allow-repeats: false

  run-tests-and-coverage:
    name: Run tests & coverage
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: package.json
          standalone: true
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install

      - name: Run Tests & Coverage
        run: pnpm test-and-coverage --outputFile=coverage-report.json

      - name: Upload Coverage Report to PR
        uses: ArtiomTr/jest-coverage-report-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          coverage-file: coverage-report.json
          base-coverage-file: coverage-report.json
          skip-step: all
          annotations: none

  build:
    name: Build and upload artifacts
    needs: check-slot-capacity
    uses: ./.github/workflows/template-build.yml
    with:
      tag: pr-${{ github.event.number }}
    permissions:
      id-token: write
      contents: read
    secrets: inherit

  pr-deploy:
    name: Deploy to slot
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v6

      - name: Load .env file
        uses: xom9ikk/dotenv@v2
        with:
          path: ./.github

      - name: Deploy to slot
        uses: ./.github/actions/deploy
        id: deploy
        with:
          slot_name: pr-${{ github.event.number }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP: ${{ env.AZURE_RESOURCE_GROUP }}
          APP_SERVICE_NAME: ${{ env.APP_SERVICE_NAME }}
          ACR_LOGIN_SERVER: ${{ env.ACR_LOGIN_SERVER }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          AZURE_SERVICE_PRINCIPAL_OBJECT_ID: ${{ secrets.AZURE_SERVICE_PRINCIPAL_OBJECT_ID }}

      - name: Comment on PR
        uses: mshick/add-pr-comment@v3
        with:
          message: |
            Deployed changes to <${{ steps.deploy.outputs.url }}>
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          allow-repeats: true

  ui-test:
    name: Run Playwright Tests
    needs: pr-deploy
    uses: ./.github/workflows/template-ui-tests.yml
    with:
      deploy_url: ${{ needs.pr-deploy.outputs.url }}
      tests_to_run: "images seo-noindex"

  prLighthouseInsights:
    name: Run PR Lighthouse Insights
    uses: ./.github/workflows/template-lighthouse.yml
    permissions:
      pull-requests: write
    needs: [pr-deploy]
    with:
      url: ${{ needs.pr-deploy.outputs.url }}
    secrets:
      GH_APP_KEY: ${{ secrets.GH_APP_KEY }}
