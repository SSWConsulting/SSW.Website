name: Template - Build site

on:
  workflow_call:
    inputs:
      tag:
        type: string
        required: true
      # For comment-triggered (issue_comment) builds the event context points at
      # main, not the PR - so the caller must pass the PR's ref/branch/number.
      ref:
        type: string
        required: false
        default: ""
        description: "Git ref to build; defaults to the ref that triggered the workflow"
      tina_branch:
        type: string
        required: false
        default: ""
        description: "Tina branch to build against; defaults to the triggering branch"
      pr_number:
        type: string
        required: false
        default: ""
        description: "PR number for the slot URL; defaults to the event's PR number"
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      NEXT_PUBLIC_TINA_CLIENT_ID:
        required: true
      TINA_TOKEN:
        required: true
      TINA_SEARCH_TOKEN:
        required: true
      NEXT_PUBLIC_GOOGLE_GTM_ID:
        required: true
      JOTFORM_API_KEY:
        required: true
      POWER_AUTOMATE_LEAD_WEBHOOK_URL:
        required: true
      # Not required so builds don't fail before the keys are provisioned; the
      # lead-capture form fails closed at runtime until they're set.
      NEXT_PUBLIC_TURNSTILE_SITE_KEY:
        required: false
      TURNSTILE_SECRET_KEY:
        required: false

defaults:
  run:
    shell: pwsh

permissions:
  id-token: write
  contents: read

jobs:
  build-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Load .env file
        uses: xom9ikk/dotenv@v2
        with:
          path: ./.github

      - name: Get current date
        id: date
        run: |
          echo "date=$(Get-Date -Format yyyy-MM-ddThh:mm:ssZ -AsUtc)" >> $env:GITHUB_OUTPUT

      - name: Azure CLI - Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: keyVault - Secrets
        uses: theotow/keyvault-secret-azure@v1
        id: KeyVaultSecrets
        with:
          key-vault-name: ${{ env.KEY_VAULT }}
          config: |
            {
              "YOUTUBE_PRIVATE_KEY": "YOUTUBE-PRIVATE-KEY"
            }

      - name: AppInsight - Connection Strings
        shell: pwsh
        id: AppInsight
        run: |
          # AppInsight - Connection String
          az config set extension.use_dynamic_install=yes_without_prompt
          $AppInsightName = if ("${{ inputs.tag }}" -clike "pr-*") { "${{ env.APP_INSIGHT_DEV }}" } else { "${{ env.APP_INSIGHT_PROD }}" }

          $AppInsightConnectionString = (az monitor app-insights component show --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --app $AppInsightName --query connectionString -o tsv)
          echo "AppInsightConnectionString=$AppInsightConnectionString" >> $env:GITHUB_OUTPUT
          Write-Host '✅ AppInsight - Connection String retrieved'

      - name: ACR - Login
        run: |
          az acr login --name ${{ env.ACR_LOGIN_SERVER }}

      - name: Get Node version from .nvmrc
        id: node-version
        run: |
          $nodeVersion = (Get-Content .nvmrc).Trim() -replace '^v', ''
          echo "version=$nodeVersion" >> $env:GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker - Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            NODE_VERSION=${{ steps.node-version.outputs.version }}
            NODE_OPTIONS=--max_old_space_size=8192
            NEXT_PUBLIC_GOOGLE_GTM_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_GTM_ID }}
            NEXT_PUBLIC_GITHUB_RUN_DATE=${{ steps.date.outputs.date }}
            NEXT_PUBLIC_GITHUB_RUN_ID=${{ github.run_id }}
            NEXT_PUBLIC_GITHUB_RUN_NUMBER=${{ github.run_number }}
            NEXT_PUBLIC_GITHUB_REPOSITORY=${{ github.repository }}
            NEXT_PUBLIC_GITHUB_SHA=${{ inputs.ref || github.sha }}
            NEXT_PUBLIC_TINA_CLIENT_ID=${{ secrets.NEXT_PUBLIC_TINA_CLIENT_ID }}
            NEXT_PUBLIC_TINA_BRANCH=${{ inputs.tina_branch || github.head_ref || github.ref_name }}
            KEY_VAULT=${{ env.KEY_VAULT }}
            NEXT_PUBLIC_APP_INSIGHT_CONNECTION_STRING=${{ steps.AppInsight.outputs.AppInsightConnectionString }}
            NEXT_PUBLIC_CHATBASE_BOT_ID=${{ env.NEXT_PUBLIC_CHATBASE_BOT_ID }}
            SITE_URL=https://www.ssw.com.au
            JOTFORM_API_KEY=${{ secrets.JOTFORM_API_KEY }}
            POWER_AUTOMATE_LEAD_WEBHOOK_URL=${{ secrets.POWER_AUTOMATE_LEAD_WEBHOOK_URL }}
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
            TURNSTILE_SECRET_KEY=${{ secrets.TURNSTILE_SECRET_KEY }}
            NEXT_PUBLIC_SLOT_URL=https://${{ env.APP_SERVICE_NAME}}-pr-${{ inputs.pr_number || github.event.number }}.azurewebsites.net/

          # Mounted as secrets (not build-args) so they are not baked into the
          # exported BuildKit cache (cache-to mode=max).
          secrets: |
            TINA_TOKEN=${{ secrets.TINA_TOKEN }}
            TINA_SEARCH_TOKEN=${{ secrets.TINA_SEARCH_TOKEN }}
            YOUTUBE_PRIVATE_KEY=${{ env.YOUTUBE_PRIVATE_KEY }}

          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
