name: Weekly app service slot cleanup

on:
  schedule:
    # Monday at 12 PM UTC - https://cron.help/#0_12_*_*_MON
    - cron: "0 12 * * MON"
  workflow_dispatch:

env:
  GH_TOKEN: ${{ github.token }}
  # PR slots are deleted if their PR is closed (orphan) or inactive for this many days.
  STALE_DAYS: 7

defaults:
  run:
    shell: pwsh

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  check-pr-slots:
    runs-on: ubuntu-latest
    outputs:
      slotList: ${{ steps.compute.outputs.slotList }}

    steps:
      - name: Checking out
        uses: actions/checkout@v7

      - name: Load .env file
        uses: xom9ikk/dotenv@v2
        with:
          path: ./.github

      - name: Azure CLI - Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Determine slots to delete (orphaned or stale) and comment
        id: compute
        run: |
          # Default to 7; only override if STALE_DAYS is a valid positive int
          $staleDays = 7
          $parsedDays = 0
          if ([int]::TryParse("${{ env.STALE_DAYS }}", [ref]$parsedDays) -and $parsedDays -gt 0) { $staleDays = $parsedDays }
          $cutoff = (Get-Date).ToUniversalTime().AddDays(-$staleDays)

          # All PR slot numbers (strip 'pr-' prefix); the permanent 'staging' slot is left alone
          $slotNames = az webapp deployment slot list `
            --name ${{ env.APP_SERVICE_NAME }} `
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} `
            --query "[?starts_with(name, 'pr-')].name" `
            --output tsv
          $slots = @($slotNames -split "`n" | Where-Object { $_ -ne '' } | ForEach-Object { $_ -replace '^pr-', '' })

          # Open PRs mapped to their last-updated timestamp
          $openPrs = gh pr list --state open --json number,updatedAt | ConvertFrom-Json
          $openMap = @{}
          foreach ($pr in $openPrs) { $openMap["$($pr.number)"] = $pr.updatedAt }

          $toDelete = @()
          foreach ($slot in $slots) {
            if (-not $openMap.ContainsKey($slot)) {
              Write-Host "🗑️  pr-$slot - no open PR (orphan) -> delete"
              $toDelete += $slot
              continue
            }

            $updated = ([datetime]$openMap[$slot]).ToUniversalTime()
            if ($updated -lt $cutoff) {
              Write-Host "🧹 pr-$slot - PR #$slot inactive since $updated -> delete + comment"
              gh pr comment $slot --body "🧹 Your **staging deployment was removed** during weekly cleanup because this PR has been inactive for over $staleDays days. Comment ``/deploy`` on this PR to spin up a fresh staging environment."
              $toDelete += $slot
            }
            else {
              Write-Host "✅ pr-$slot - active (updated $updated) - keeping"
            }
          }

          # @(...) already yields a JSON array for 0/1/many elements; -AsArray would double-wrap
          $json = ConvertTo-Json -Compress @($toDelete)
          Write-Host "Slots queued for deletion: $json"
          echo "slotList=$json" >> $env:GITHUB_OUTPUT

  invokeDeleteSlot:
    name: Invoking PR Close/Delete
    needs:
      - check-pr-slots # Adding second check to avoid running this flow
    if: needs.check-pr-slots.outputs.slotList != '[]'
    uses: ./.github/workflows/pr-close-delete-env.yml
    with:
      slotIDs: ${{ needs.check-pr-slots.outputs.slotList }}
    permissions:
      id-token: write
      contents: read
    secrets: inherit
